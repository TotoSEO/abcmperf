<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg); font-family: var(--font-sans); }
  .grp { margin-bottom: 24px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Tabs, Accordion, Alert } = window.ABCMPerformancesDesignSystem_d992a8;
    function Demo() {
      return (
        <React.Fragment>
          <div className="grp">
            <div className="lbl">Tabs</div>
            <div className="row" style={{gap:'24px'}}>
              <Tabs tabs={["Site web","SEO","Ads"]} />
              <Tabs variant="line" tabs={["Stratégie","Création","Suivi"]} />
            </div>
          </div>
          <div className="grp">
            <div className="lbl">Accordion</div>
            <Accordion defaultOpen={[0]} items={[
              { title: "Combien coûte un site internet ?", content: "Chaque projet est sur-mesure : nous établissons un devis selon vos besoins, du site vitrine au e-commerce." },
              { title: "Quels sont les délais ?", content: "Comptez en général 4 à 8 semaines entre le lancement et la mise en ligne." },
            ]} />
          </div>
          <div className="grp">
            <div className="lbl">Alerts</div>
            <div className="stack">
              <Alert variant="success" title="Demande envoyée">Notre équipe vous répond sous 24h ouvrées.</Alert>
              <Alert variant="info" title="Nouvel article au blog">Découvrez nos tendances marketing digital pour 2026.</Alert>
              <Alert variant="danger" title="Échec de l'envoi">Vérifiez votre adresse email et réessayez.</Alert>
            </div>
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
