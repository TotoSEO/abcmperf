<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg); font-family: var(--font-sans); }
  .grp { margin-bottom: 26px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 12px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .stats { display: flex; gap: 38px; }
  .dark { background: var(--night); border-radius: var(--radius-lg); padding: 24px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const NS = window.ABCMPerformancesDesignSystem_d992a8;
    const { LogoMark, SectionHeading, ServiceCard, StatCard, TestimonialCard } = NS;
    const I = (p) => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{p.children}</svg>);
    function Demo() {
      return (
        <React.Fragment>
          <div className="grp" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <LogoMark src="../../assets/logo-abcm-circles.png" />
            <SectionHeading eyebrow="Nos services" title="Une approche 360°" />
          </div>
          <div className="grp">
            <div className="grid3">
              <ServiceCard hue="blue" icon={<I><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18"/></I>} title="Site web" description="Vitrine, e-commerce, one-page." href="#" />
              <ServiceCard hue="magenta" icon={<I><path d="M3 11l18-5v12L3 13z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></I>} title="Community Management" description="On gère vos réseaux sociaux." href="#" />
              <ServiceCard hue="green" icon={<I><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></I>} title="Référencement SEO" description="Devenez visible sur Google." href="#" />
            </div>
          </div>
          <div className="grp dark on-dark">
            <div className="stats">
              <StatCard prefix="+" value="150" label="projets livrés" hue="yellow" />
              <StatCard value="2015" label="depuis" hue="magenta" />
              <StatCard value="9" label="experts dédiés" hue="green" />
              <StatCard value="4,9" suffix="/5" label="avis Google" hue="blue" />
            </div>
          </div>
          <div className="grp">
            <TestimonialCard rating={5} author="Kevin Kanel" source="Google · Avis vérifié"
              quote="Professionnalisme & réactivité — nous sommes extrêmement satisfaits du résultat." />
          </div>
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
