<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg); font-family: var(--font-sans); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .lbl { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin: 0 0 4px; }
  .row { display: flex; gap: 18px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const NS = window.ABCMPerformancesDesignSystem_d992a8;
    const { Input, Textarea, Select, Checkbox, Radio, Switch } = NS;
    const Mail = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>);
    function Demo() {
      const [on, setOn] = React.useState(true);
      return (
        <div className="cols">
          <div className="stack">
            <Input label="Email" type="email" placeholder="vous@entreprise.fr" icon={<Mail/>} required />
            <Select label="Service" placeholder="Choisir un service…" options={["Création de site web","Référencement SEO","Community Management","Google Ads"]} />
            <Input label="Téléphone" defaultValue="06 33 07 28 53" error="Numéro invalide" />
          </div>
          <div className="stack">
            <Textarea label="Votre projet" rows={3} placeholder="Décrivez vos besoins…" hint="Réponse sous 24h ouvrées." />
            <div>
              <p className="lbl">Choix</p>
              <div className="stack" style={{gap:'10px'}}>
                <Checkbox label="J'accepte d'être recontacté" defaultChecked />
                <Radio name="p" label="Forfait mensuel" defaultChecked />
                <Radio name="p" label="Projet ponctuel" />
                <Switch label="Recevoir la newsletter" checked={on} onChange={(e)=>setOn(e.target.checked)} />
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
  </script>
</body>
</html>
