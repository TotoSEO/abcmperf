<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Yellow" subtitle="Primary action colour & its ramp" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font-sans); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; height: 96px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; border: 1px solid var(--border); }
  .sw b { font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
  .sw span { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
  .dark { color: var(--night); }
  .light { color: #fff; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw dark" style="background: var(--accent-100);"><b>100</b><span>#fff4bd</span></div>
    <div class="sw dark" style="background: var(--accent-200);"><b>200</b><span>#ffe98a</span></div>
    <div class="sw dark" style="background: var(--accent-300);"><b>300</b><span>#fcdf5e</span></div>
    <div class="sw dark" style="background: var(--accent-400); box-shadow: var(--shadow-sm);"><b>400 ·accent</b><span>#fad646</span></div>
    <div class="sw dark" style="background: var(--accent-500);"><b>500</b><span>#f0c520</span></div>
    <div class="sw light" style="background: var(--accent-600);"><b>600</b><span>#d2a60a</span></div>
    <div class="sw light" style="background: var(--accent-700);"><b>700</b><span>#a07e06</span></div>
  </div>
</body>
</html>
