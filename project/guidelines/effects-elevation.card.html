<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation" subtitle="Soft, cool-tinted shadows — --shadow-*" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--neutral-50); font-family: var(--font-mono); }
  .row { display: flex; gap: 22px; align-items: center; }
  .item { text-align: center; }
  .box { width: 92px; height: 70px; background: var(--surface); border-radius: var(--radius-md); }
  .t { font-size: 10px; color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xs);"></div><div class="t">xs</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm);"></div><div class="t">sm</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md);"></div><div class="t">md</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg);"></div><div class="t">lg</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xl);"></div><div class="t">xl</div></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-accent); background: var(--accent-400);"></div><div class="t">accent</div></div>
  </div>
</body>
</html>
