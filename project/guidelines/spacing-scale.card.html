<!-- @dsCard group="Spacing" viewport="700x190" name="Spacing scale" subtitle="4px base grid — --space-*" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-mono); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { text-align: center; }
  .bar { background: var(--accent-400); border-radius: var(--radius-xs); width: 100%; }
  .t { font-size: 10px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px;width:4px;"></div><div class="t">1·4</div></div>
    <div class="item"><div class="bar" style="height:8px;width:8px;"></div><div class="t">2·8</div></div>
    <div class="item"><div class="bar" style="height:12px;width:12px;"></div><div class="t">3·12</div></div>
    <div class="item"><div class="bar" style="height:16px;width:16px;"></div><div class="t">4·16</div></div>
    <div class="item"><div class="bar" style="height:24px;width:24px;"></div><div class="t">6·24</div></div>
    <div class="item"><div class="bar" style="height:32px;width:32px;"></div><div class="t">8·32</div></div>
    <div class="item"><div class="bar" style="height:48px;width:48px;"></div><div class="t">12·48</div></div>
    <div class="item"><div class="bar" style="height:64px;width:64px;"></div><div class="t">16·64</div></div>
    <div class="item"><div class="bar" style="height:80px;width:80px;"></div><div class="t">20·80</div></div>
  </div>
</body>
</html>
