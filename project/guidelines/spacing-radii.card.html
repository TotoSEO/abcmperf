<!-- @dsCard group="Spacing" viewport="700x170" name="Radii" subtitle="Rounded, echoing the circular logo — --radius-*" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 76px; height: 76px; background: var(--neutral-100); border: 2px solid var(--accent-400); }
  .t { font-size: 10px; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius: var(--radius-sm);"></div><div class="t">sm·10</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-md);"></div><div class="t">md·14</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-lg);"></div><div class="t">lg·20</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-xl);"></div><div class="t">xl·28</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-2xl);"></div><div class="t">2xl·36</div></div>
    <div class="item"><div class="box" style="border-radius: var(--radius-pill);"></div><div class="t">pill</div></div>
    <div class="item"><div class="box" style="border-radius: 50%;"></div><div class="t">full</div></div>
  </div>
</body>
</html>
