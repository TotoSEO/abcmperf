<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface); }
  .stack { display: flex; flex-direction: column; gap: 6px; }
  .line { display: flex; align-items: baseline; gap: 14px; }
  .tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 70px; flex: none; }
  .d { font-family: var(--font-display); font-weight: 700; letter-spacing: var(--tracking-tight); color: var(--text); line-height: 1.05; }
</style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="tag">4xl / 84</span><span class="d" style="font-size: 56px;">Boostez</span></div>
    <div class="line"><span class="tag">2xl / 36</span><span class="d" style="font-size: 36px;">Votre visibilité en ligne</span></div>
    <div class="line"><span class="tag">xl / 28</span><span class="d" style="font-size: 28px;">Stratégie digitale sur-mesure</span></div>
    <div class="line"><span class="tag">lg / 22</span><span class="d" style="font-size: 22px; font-weight: 600;">Une équipe à taille humaine</span></div>
  </div>
</body>
</html>
