<!-- @dsCard group="Colors" viewport="700x150" name="Semantic states" subtitle="Success / info / warning / danger — mapped to the logo palette" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font-sans); }
  .row { display: flex; gap: 12px; }
  .item { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border); }
  .bar { height: 52px; display: flex; align-items: center; justify-content: center; color: #fff; font-family: var(--font-mono); font-size: 12px; font-weight: 700; }
  .soft { height: 38px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="background: var(--success);">success</div><div class="soft" style="background: var(--success-soft); color: var(--success);">soft</div></div>
    <div class="item"><div class="bar" style="background: var(--info);">info</div><div class="soft" style="background: var(--info-soft); color: var(--info);">soft</div></div>
    <div class="item"><div class="bar" style="background: var(--warning);">warning</div><div class="soft" style="background: var(--warning-soft); color: var(--warning);">soft</div></div>
    <div class="item"><div class="bar" style="background: var(--danger);">danger</div><div class="soft" style="background: var(--danger-soft); color: var(--danger);">soft</div></div>
  </div>
</body>
</html>
