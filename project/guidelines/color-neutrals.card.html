<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals" subtitle="Cool-biased ramp anchored on the night blue" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface); font-family: var(--font-mono); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; height: 92px; border-radius: var(--radius-sm); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-size: 10px; font-weight: 700; border: 1px solid var(--border); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--neutral-50); color: var(--neutral-700);">50</div>
    <div class="sw" style="background: var(--neutral-100); color: var(--neutral-700);">100</div>
    <div class="sw" style="background: var(--neutral-200); color: var(--neutral-700);">200</div>
    <div class="sw" style="background: var(--neutral-300); color: var(--neutral-800);">300</div>
    <div class="sw" style="background: var(--neutral-400); color: #fff;">400</div>
    <div class="sw" style="background: var(--neutral-500); color: #fff;">500</div>
    <div class="sw" style="background: var(--neutral-600); color: #fff;">600</div>
    <div class="sw" style="background: var(--neutral-700); color: #fff;">700</div>
    <div class="sw" style="background: var(--neutral-800); color: #fff;">800</div>
    <div class="sw" style="background: var(--neutral-900); color: #fff;">900</div>
    <div class="sw" style="background: var(--night); color: #fff;">night</div>
  </div>
</body>
</html>
