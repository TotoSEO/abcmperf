<!-- @dsCard group="Brand" viewport="700x200" name="Circle motif" subtitle="Overlapping translucent circles — the signature brand device" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 0; background: var(--night); overflow: hidden; }
  .stage { height: 200px; display: flex; align-items: center; justify-content: center; gap: 0; }
  .c { width: 120px; height: 120px; border-radius: 50%; mix-blend-mode: screen; margin-left: -34px; opacity: 0.92; }
  .c:first-child { margin-left: 0; }
</style>
</head>
<body>
  <div class="stage">
    <div class="c" style="background: var(--logo-yellow);"></div>
    <div class="c" style="background: var(--logo-orange);"></div>
    <div class="c" style="background: var(--logo-magenta);"></div>
    <div class="c" style="background: var(--logo-blue);"></div>
    <div class="c" style="background: var(--logo-green);"></div>
  </div>
</body>
</html>
