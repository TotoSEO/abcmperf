<!-- @dsCard group="Colors" viewport="700x170" name="Brand gradients" subtitle="The 5 logo colours as one expressive system" -->
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface); font-family: var(--font-sans); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .bar { height: 40px; border-radius: var(--radius-pill); }
  .b1 { background: var(--gradient-brand); }
  .b2 { background: var(--gradient-warm); }
  .b3 { background: var(--gradient-brand-3); }
  .row { display: flex; align-items: center; gap: 16px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 130px; flex: none; }
  .demo { font-family: var(--font-display); font-weight: 700; font-size: 30px; letter-spacing: -0.02em; background: var(--gradient-warm); -webkit-background-clip: text; background-clip: text; color: transparent; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="name">--gradient-brand</span><div class="bar b1" style="flex:1"></div></div>
    <div class="row"><span class="name">--gradient-warm</span><div class="bar b2" style="flex:1"></div></div>
    <div class="row"><span class="name">--gradient-brand-3</span><div class="bar b3" style="flex:1"></div></div>
    <div class="row"><span class="name">.text-gradient</span><span class="demo">Boostez votre visibilité</span></div>
  </div>
</body>
</html>
